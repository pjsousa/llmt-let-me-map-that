stories:
  - id: "E1-S1"
    title: "Initialize IndexedDB Schema"
    status: "review"
    epic_file: "docs/epics/epic-1.md"
    plan:
      - "Initialize minimal TypeScript project (package.json, tsconfig.json) — just enough to author and type-check the data layer; full Vite+React+Tailwind scaffolding is E3-S1"
      - "Install idb as a dependency"
      - "Define Result<T> type: success+data or error string"
      - "Create database initialization module: open phaseboard database version 1 with projects store (keyPath: id) and phase1Items store (keyPath: id, index on projectId)"
      - "Implement error handling for database open failures, returning typed Result error results"
      - "Verify database opens with correct stores and indexes (manual check or smoke script; unit tests covered in E1-S4)"
  - id: "E1-S2"
    title: "Implement Project CRUD in ProjectRepository"
    status: "review"
    epic_file: "docs/epics/epic-1.md"
    plan:
      - "Import and reuse the database connection opened by the E1-S1 initialization module (do not open a second connection)"
      - "Define Project TypeScript type/interface mirroring the data model (id, name, originalPrompt, kickoffThreadUrl, phase2Prompt, createdAt, updatedAt)"
      - "Implement createProject(name) — generate UUID via crypto.randomUUID(), set createdAt/updatedAt to ISO strings, initialize optional fields as empty strings, write to IndexedDB projects store, return Result<Project>"
      - "Implement getProject(id) — read from projects store by key, return Result<Project> with error string if not found"
      - "Implement getAllProjects() — read all projects from store, sort by updatedAt descending, return Result<Project[]>"
      - "Implement updateProject(id, fields) — read existing project, merge partial fields (reject or strip attempts to change id or createdAt), set updatedAt to new ISO string, write back, return Result<Project>"
      - "Ensure all four methods return Result<T> — no thrown exceptions; all IndexedDB errors caught and returned as error results"
      - "Verify methods work against the IndexedDB schema established in E1-S1 (projects store with keyPath: id)"
  - id: "E1-S3"
    title: "Implement Phase 1 Item CRUD with Sequence Logic"
    status: "Draft"
    epic_file: "docs/epics/epic-1.md"
    plan:
      - "Define Phase1Item TypeScript type/interface mirroring the data model (id, projectId, sequenceNumber, promptText, conversationUrl, artifactUrl, deleted, createdAt, updatedAt)"
      - "Create src/data/phase1-repository.ts following the same pattern as project-repository.ts (openDatabase → error check → try/catch → Result<T>)"
      - "Implement createPhase1Item(projectId, promptText): query ALL phase1Items for the project (including deleted) via the projectId index, compute nextSeqNum = max(sequenceNumber) + 1 (or 1 if none), generate UUID, set timestamps, deleted=false, empty conversationUrl/artifactUrl, write to phase1Items store, return Result<Phase1Item>"
      - "Implement getPhase1Items(projectId): read all items via projectId index, filter out deleted===true, sort by sequenceNumber ascending, return Result<Phase1Item[]>"
      - "Implement updatePhase1Item(id, fields): read existing item by key, return error if not found, strip any attempt to change sequenceNumber or projectId from the fields partial, merge remaining fields, set updatedAt to new ISO string, write back, return Result<Phase1Item>"
      - "Implement deletePhase1Item(id): read existing item by key, return error if not found, set deleted=true and update updatedAt, write back, return Result<void>"
      - "Add a helper getAllPhase1ItemsForSeq(projectId, db) that retrieves ALL items (including deleted) for sequence number computation — used internally by createPhase1Item only, not exported"
      - "Export all four public functions and update src/data/index.ts barrel exports"
      - "Verify no changes to database.ts schema — phase1Items store with projectId index already exists from E1-S1"
