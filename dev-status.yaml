    plan:
      - "Replace src/pages/project-list-page.tsx shell with a functional React component: add imports for useState/useEffect from React, useNavigate from react-router-dom, getAllProjects/createProject/Project from @/data, validateProjectName from @/validation, useFeedbackContext from @/feedback"
      - "Add component state: projects (Project[]), loading (boolean, initial true), loadError (boolean, initial false), newProjectName (string), validationError (string)"
      - "Add useEffect on mount to call getAllProjects() — on success set projects and loading=false; on failure set loading=false, set loadError=true, and call addError with the error message; dependency array empty (runs once)"
      - "Add handleCreateProject async function: trim newProjectName, call validateProjectName, if invalid set validationError to the first error message and return; if valid call createProject(trimmedName), on success call addSuccess('Project created'), navigate to /project/{project.id}, on failure call addError with the error message"
      - "Render loading state: when loading is true, show a centered 'Loading…' text styled with text-gray-500"
      - "Render load error state: when loading is false and loadError is true, show 'Failed to load projects.' with a 'Retry' button that resets loading=true, loadError=false and re-runs the fetch; the 'New Project' section is still visible below this error message so creation is not blocked by a read failure"
      - "Render empty state: when loading is false, loadError is false, and projects array is empty, show 'No projects yet. Create your first one.' styled with text-gray-500"
      - "Render project list: when projects exist, map each to a clickable list item (Link from react-router-dom to /project/{id}) showing project name (font-medium text-gray-900) and formatted createdAt date (text-sm text-gray-500); style as a vertical list with spacing, each item in a card with bg-white rounded border border-gray-200 px-4 py-3 hover:bg-gray-50"
      - "Render 'New Project' section below the list (or below empty/error state): an h2 'New Project' heading, a text input for the project name (styled consistently with border border-gray-300 rounded px-3 py-2), an inline validation error message (text-red-600 text-sm) displayed conditionally below the input when validationError is non-empty, and a 'Create' button (bg-gray-900 text-white rounded px-4 py-2 hover:bg-gray-800) that calls handleCreateProject on click; pressing Enter in the name input also calls handleCreateProject; on successful creation the component does not need to update the local projects array because navigate will unmount it"
      - "Clear validationError when the user types in the name input (onChange handler sets newProjectName and clears validationError)"
      - "Verify npm run typecheck passes with no type errors in the updated component"
      - "Verify npm test passes (existing tests unchanged; no new tests needed for this UI component)"
