  - id: "E2-S2"
    title: "Implement FeedbackService (Toast System)"
    status: "review"
    epic_file: "docs/epics/epic-2.md"
    plan:
      - "Create src/feedback/types.ts — define Toast type: { id: string; message: string; kind: 'success' | 'error'; createdAt: number } and FeedbackAction type (discriminated union: { type: 'ADD_SUCCESS'; message: string } | { type: 'ADD_ERROR'; message: string } | { type: 'DISMISS'; id: string }) and FeedbackState type (Toast[]); these are pure types with no React dependency"
      - "Create src/feedback/toast-reducer.ts — implement a pure reducer function feedbackReducer(state: FeedbackState, action: FeedbackAction): FeedbackState; handles three actions: ADD_SUCCESS adds a toast with kind='success' and a generated UUID id; ADD_ERROR adds a toast with kind='error'; DISMISS removes a toast by id; state is an array ordered by creation; no side effects — auto-dismiss scheduling is a React hook concern, not the reducer"
      - "Create src/feedback/__tests__/feedback.test.ts — unit test the pure reducer logic (no React, no timers needed in reducer): ADD_SUCCESS adds a toast with kind='success' and a generated id; ADD_ERROR adds a toast with kind='error'; DISMISS removes a toast by id; multiple ADD actions stack toasts in order of creation; DISMISS on a non-existent id returns state unchanged; after ADD_SUCCESS + DISMISS, the toast is removed; after multiple ADDs, only the dismissed toast is removed"
      - "Create src/feedback/index.ts barrel export — re-export types (Toast, FeedbackAction, FeedbackState) and feedbackReducer for use by consumer modules"
      - "Note: Deferred to E3-S1 (when Vite+React scaffold exists): useFeedback hook (needs useReducer, useEffect, setTimeout for auto-dismiss), FeedbackContext (needs React.createContext), FeedbackContextShape interface (references the hook API), ToastContainer component (needs React/JSX). The pure types and reducer delivered here are the foundation those React modules will consume."
      - "Note: Inline validation error display (showing field-level messages next to inputs) is a UI-layer concern that will be handled directly in page components using ValidationResult from E2-S1; it is not part of the FeedbackService toast system and is out of scope for this story."
      - "Run npm test and npm run typecheck to verify all tests pass and types are correct"
