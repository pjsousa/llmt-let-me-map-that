stories:
  - id: "E1-S1"
    title: "Initialize IndexedDB Schema"
    status: "review"
    epic_file: "docs/epics/epic-1.md"
    plan:
      - "Initialize minimal TypeScript project (package.json, tsconfig.json) — just enough to author and type-check the data layer; full Vite+React+Tailwind scaffolding is E3-S1"
      - "Install idb as a dependency"
      - "Define Result<T> type: success+data or error string"
      - "Create database initialization module: open phaseboard database version 1 with projects store (keyPath: id) and phase1Items store (keyPath: id, index on projectId)"
      - "Implement error handling for database open failures, returning typed Result error results"
      - "Verify database opens with correct stores and indexes (manual check or smoke script; unit tests covered in E1-S4)"
  - id: "E1-S2"
    title: "Implement Project CRUD in ProjectRepository"
    status: "review"
    epic_file: "docs/epics/epic-1.md"
    plan:
      - "Import and reuse the database connection opened by the E1-S1 initialization module (do not open a second connection)"
      - "Define Project TypeScript type/interface mirroring the data model (id, name, originalPrompt, kickoffThreadUrl, phase2Prompt, createdAt, updatedAt)"
      - "Implement createProject(name) — generate UUID via crypto.randomUUID(), set createdAt/updatedAt to ISO strings, initialize optional fields as empty strings, write to IndexedDB projects store, return Result<Project>"
      - "Implement getProject(id) — read from projects store by key, return Result<Project> with error string if not found"
      - "Implement getAllProjects() — read all projects from store, sort by updatedAt descending, return Result<Project[]>"
      - "Implement updateProject(id, fields) — read existing project, merge partial fields (reject or strip attempts to change id or createdAt), set updatedAt to new ISO string, write back, return Result<Project>"
      - "Ensure all four methods return Result<T> — no thrown exceptions; all IndexedDB errors caught and returned as error results"
      - "Verify methods work against the IndexedDB schema established in E1-S1 (projects store with keyPath: id)"
  - id: "E1-S3"
    title: "Implement Phase 1 Item CRUD with Sequence Logic"
    status: "review"
    epic_file: "docs/epics/epic-1.md"
    plan:
      - "Define Phase1Item TypeScript type/interface mirroring the data model (id, projectId, sequenceNumber, promptText, conversationUrl, artifactUrl, deleted, createdAt, updatedAt)"
      - "Create src/data/phase1-repository.ts following the same pattern as project-repository.ts (openDatabase → error check → try/catch → Result<T>)"
      - "Implement createPhase1Item(projectId, promptText): query ALL phase1Items for the project (including deleted) via the projectId index, compute nextSeqNum = max(sequenceNumber) + 1 (or 1 if none), generate UUID, set timestamps, deleted=false, empty conversationUrl/artifactUrl, write to phase1Items store, return Result<Phase1Item>"
      - "Implement getPhase1Items(projectId): read all items via projectId index, filter out deleted===true, sort by sequenceNumber ascending, return Result<Phase1Item[]>"
      - "Implement updatePhase1Item(id, fields): read existing item by key, return error if not found, strip any attempt to change sequenceNumber or projectId from the fields partial, merge remaining fields, set updatedAt to new ISO string, write back, return Result<Phase1Item>"
      - "Implement deletePhase1Item(id): read existing item by key, return error if not found, set deleted=true and update updatedAt, write back, return Result<void>"
      - "Add a helper getAllPhase1ItemsForSeq(projectId, db) that retrieves ALL items (including deleted) for sequence number computation — used internally by createPhase1Item only, not exported"
      - "Export all four public functions and update src/data/index.ts barrel exports"
      - "Verify no changes to database.ts schema — phase1Items store with projectId index already exists from E1-S1"
  - id: "E1-S4"
    title: "Unit Test Sequence Integrity Scenarios"
    status: "review"
    epic_file: "docs/epics/epic-1.md"
    plan:
      - "Install vitest and fake-indexeddb as dev dependencies (npm install -D vitest fake-indexeddb)"
      - "Add test scripts to package.json: \"test\": \"vitest run\", \"test:watch\": \"vitest\""
      - "Create vitest.config.ts with setupFiles pointing to the test setup file and path alias resolution for @/*"
      - "Create src/data/__tests__/setup.ts that imports fake-indexeddb/auto to provide a global IndexedDB implementation for all tests"
      - "Add a closeDatabase() function to src/data/database.ts that awaits the current dbPromise (if any), closes the open DB connection, and resets dbPromise to null — exported for tests to simulate a fresh open without deleting data"
      - "Add a resetDatabase() function to src/data/database.ts that calls closeDatabase() then calls indexedDB.deleteDatabase(\"phaseboard\") — exported for test teardown to ensure full test isolation with a fresh empty database"
      - "Create src/data/__tests__/sequence-integrity.test.ts with beforeEach(resetDatabase) to guarantee a fresh empty database for each test"
      - "Test: empty project — create a project, add first Phase1Item, verify sequenceNumber = 1"
      - "Test: consecutive adds — create a project, add 3 items, verify sequence numbers 1, 2, 3"
      - "Test: delete-gap — create a project, add items resulting in sequenceNumbers 1–3, soft-delete item with sequenceNumber 2, add a new item, verify it gets sequenceNumber = 4 (not 2, confirming deleted numbers are never reused)"
      - "Test: delete-middle-add — create a project, add items resulting in sequenceNumbers 1–3, soft-delete item with sequenceNumber 2, add two more items, verify new items get auto-assigned sequenceNumbers 4 and 5; verify active items have sequenceNumbers 1, 3, 4, 5 and the deleted item retains sequenceNumber 2 with deleted = true"
      - "Test: all-deleted then add — create a project, add 3 items, soft-delete all 3, add a new item, verify it gets sequenceNumber = 4 (max of deleted 1,2,3 plus 1, not 1 — confirming sequence never restarts)"
      - "Test: cross-project isolation — create two projects, add Phase1Items to each, verify sequence numbers are independent per project (each project starts at 1)"
      - "Test: getPhase1Items excludes soft-deleted items and returns only non-deleted items sorted by sequenceNumber ascending"
      - "Test: reload/reopen — create a project and items, call closeDatabase() to close the connection without deleting data (simulating a browser close), call openDatabase() again to reopen, call getPhase1Items, verify all items and sequence numbers persist correctly"
      - "Test: updatePhase1Item immutability — update an item with a fields object cast as any that includes sequenceNumber and projectId, verify the returned item retains its original sequenceNumber and projectId unchanged (confirms runtime enforcement beyond TypeScript types)"
      - "Run npm test and verify all scenarios pass; run npm run typecheck and verify no type errors"
  - id: "E2-S1"
    title: "Implement ValidationService"
    status: "review"
    epic_file: "docs/epics/epic-2.md"
    plan:
      - "Create src/validation/types.ts — define ValidationResult type: { valid: boolean; errors: { field: string; message: string }[] }"
      - "Create src/validation/validate-project-name.ts — implement validateProjectName(name): trim input, reject empty/whitespace-only with 'Project name is required.', return ValidationResult"
      - "Create src/validation/validate-url.ts — implement validateUrl(url): trim input, allow empty/whitespace-only (valid for optional fields), reject non-empty malformed URLs using URL constructor with specific message, return ValidationResult"
      - "Create src/validation/validate-prompt-text.ts — implement validatePromptText(text): trim input, reject empty/whitespace-only with 'Prompt text is required.', return ValidationResult"
      - "Create src/validation/index.ts barrel export — re-export all validation functions and ValidationResult type"
      - "Create src/validation/__tests__/validation.test.ts — unit tests covering all acceptance criteria: validateProjectName with empty/whitespace/valid; validateUrl with empty/whitespace-only/invalid/valid; validatePromptText with empty/whitespace/valid; edge cases"
      - "Run npm test and npm run typecheck to verify all tests pass and types are correct"
  - id: "E2-S2"
    title: "Implement FeedbackService (Toast System)"
    status: "review"
    epic_file: "docs/epics/epic-2.md"
    plan:
      - "Create src/feedback/types.ts — define Toast type: { id: string; message: string; kind: 'success' | 'error'; createdAt: number } and FeedbackAction type (discriminated union: { type: 'ADD_SUCCESS'; message: string } | { type: 'ADD_ERROR'; message: string } | { type: 'DISMISS'; id: string }) and FeedbackState type (Toast[]); these are pure types with no React dependency"
      - "Create src/feedback/toast-reducer.ts — implement a pure reducer function feedbackReducer(state: FeedbackState, action: FeedbackAction): FeedbackState; handles three actions: ADD_SUCCESS adds a toast with kind='success' and a generated UUID id; ADD_ERROR adds a toast with kind='error'; DISMISS removes a toast by id; state is an array ordered by creation; no side effects — auto-dismiss scheduling is a React hook concern, not the reducer"
      - "Create src/feedback/__tests__/feedback.test.ts — unit test the pure reducer logic (no React, no timers needed in reducer): ADD_SUCCESS adds a toast with kind='success' and a generated id; ADD_ERROR adds a toast with kind='error'; DISMISS removes a toast by id; multiple ADD actions stack toasts in order of creation; DISMISS on a non-existent id returns state unchanged; after ADD_SUCCESS + DISMISS, the toast is removed; after multiple ADDs, only the dismissed toast is removed"
      - "Create src/feedback/index.ts barrel export — re-export types (Toast, FeedbackAction, FeedbackState) and feedbackReducer for use by consumer modules"
      - "Note: Deferred to E3-S1 (when Vite+React scaffold exists): useFeedback hook (needs useReducer, useEffect, setTimeout for auto-dismiss), FeedbackContext (needs React.createContext), FeedbackContextShape interface (references the hook API), ToastContainer component (needs React/JSX). The pure types and reducer delivered here are the foundation those React modules will consume."
      - "Note: Inline validation error display (showing field-level messages next to inputs) is a UI-layer concern that will be handled directly in page components using ValidationResult from E2-S1; it is not part of the FeedbackService toast system and is out of scope for this story."
      - "Run npm test and npm run typecheck to verify all tests pass and types are correct"
